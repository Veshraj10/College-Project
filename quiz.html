<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz | FIFA World Cup Ultimate Quiz</title>

    <link rel="stylesheet" href="css/theme.css" />
    <link rel="stylesheet" href="css/quiz.css" />
  </head>
  <body>
    <button id="themeToggle" class="theme-toggle">🌙 Dark Mode</button>

    <div class="overlay">
      <div class="quiz-card">
        <div class="top-bar">
          <span id="levelBadge" class="badge">EASY</span>
          <span id="questionCount">Question 1 / 20</span>
          <div class="right-controls">
            <span id="scoreDisplay">Score: 0</span>
            <button id="muteBtn" class="mute-btn" title="Mute/unmute sounds">
              🔊
            </button>
          </div>
        </div>

        <div id="progressDots" class="progress-dots"></div>

        <div class="timer-wrap">
          <div id="timerBar" class="timer-bar"></div>
        </div>
        <p id="timerText">10s</p>

        <div id="questionArea" class="question-area">
          <h2 id="questionText">Loading question...</h2>
          <div id="optionsList" class="options-list"></div>
        </div>

        <p id="feedback" class="feedback"></p>
        <p class="hint">Tip: press 1, 2, 3, or 4 to answer quickly</p>
      </div>
    </div>

    <script src="js/theme.js"></script>
    <script src="js/questions.js"></script>
    <script src="js/quiz.js"></script>
  </body>
</html>
