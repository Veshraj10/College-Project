<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Result | FIFA World Cup Ultimate Quiz</title>

    <link rel="stylesheet" href="css/theme.css" />
    <link rel="stylesheet" href="css/result.css" />
  </head>
  <body>
    <button id="themeToggle" class="theme-toggle">🌙 Dark Mode</button>

    <div class="overlay">
      <div class="quiz-card">
        <img
          src="images/trophy.png"
          alt="Trophy"
          class="trophy"
          onerror="this.style.display = 'none'"
        />

        <p id="bestBanner" class="best-banner" style="display: none"></p>

        <h1 id="resultTitle">Quiz Complete!</h1>
        <p id="playerLine" class="player-line"></p>

        <div class="score-box">
          <span class="score-label">Final Score</span>
          <span id="finalScore" class="score-value">0</span>
        </div>

        <p id="performanceMsg" class="performance-msg"></p>

        <div class="btn-row">
          <button id="playAgainBtn">🔁 Play Again</button>
          <button id="leaderboardBtn">🏆 Leaderboard</button>
        </div>
        <button id="shareBtn" class="share-btn">📋 Copy My Score</button>
      </div>
    </div>

    <script src="js/theme.js"></script>
    <script src="js/result.js"></script>
  </body>
</html>
